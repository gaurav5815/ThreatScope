version: '3.8'

services:
  # MongoDB for raw events and historical storage
  mongodb:
    image: mongo:6-jammy
    container_name: threatscope-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=threatscope

  # Redis for caching, rate limiting, and fast pub/sub streams
  redis:
    image: redis:7-alpine
    container_name: threatscope-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Elasticsearch for advanced analytics and fast searching
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: threatscope-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
  es_data:
